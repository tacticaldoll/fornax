name: plan-implementation
version: 0.1.0
family: implementation
status: draft
description: Use when an agent needs to turn a goal into an ordered, verifiable implementation plan before coding; slices the work into the smallest independently verifiable increments, sequences them by dependency and risk, and names each step's acceptance check rather than writing code, designing component structure, or planning a behavior-preserving split.
triggers:
  - user asks how to implement a feature or fix step by step
  - user asks to break a goal into an ordered, verifiable task plan
  - user asks to sequence implementation work by dependency and risk
  - user asks what the smallest shippable increments toward a goal are
  - user asks for an implementation plan before writing code
entrypoint: SKILL.md
resources:
  references: references/
compatibility:
  - openai-codex
  - claude
  - cursor
  - generic-llm-agent
  - antigravity
  - github-copilot
  - cline
  - opencode
